services:
  db:
    image: postgres:16
    container_name: sdc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-krx_data}
      POSTGRES_USER: ${POSTGRES_USER:-krx_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/postgres_ddl.sql:/docker-entrypoint-initdb.d/01-postgres_ddl.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-krx_user} -d ${POSTGRES_DB:-krx_data}"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/sjleekor/sdc:latest
    profiles: ["manual"]
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-krx_data}
      DB_USER: ${POSTGRES_USER:-krx_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      RUN_MODE: ${RUN_MODE:-prod}
      TZ: Asia/Seoul

volumes:
  postgres_data:
